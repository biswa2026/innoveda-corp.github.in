<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Our Team | Innoveda</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: #222;
      background: #ffffff;
    }

    .navbar {
      background: #0f172a;
      padding: 15px 0;
    }

    .nav-container {
      max-width: 1100px;
      margin: auto;
      display: flex;
      justify-content: flex-start;
      padding-left: 30px;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 30px;
      margin: 0;
      padding: 0;
    }

    .nav-links li a {
      color: #ffffff;
      text-decoration: none;
      font-weight: 500;
      font-size: 15px;
    }

    .nav-links li a:hover,
    .nav-links li a.active {
      text-decoration: underline;
    }

    .container {
      max-width: 1100px;
      margin: 60px auto;
      padding: 0 20px;
      text-align: center;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 20px;
    }

    .intro p {
      max-width: 900px;
      margin: 0 auto 18px;
      line-height: 1.6;
      font-size: 16px;
    }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 30px;
      margin-top: 60px;
    }

    .team-card {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 30px 20px;
      background: #fafafa;
    }

    .team-card img {
      width: 160px;
      height: 160px;
      object-fit: cover;
      border-radius: 50%;
      margin-bottom: 20px;
    }

    .team-card h3 {
      margin: 10px 0 5px;
      font-size: 20px;
    }

    .team-card p {
      margin: 0;
      color: #555;
      font-size: 14px;
    }

    .leadership {
      margin-top: 80px;
      text-align: left;
    }

    .leadership h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .leadership p {
      max-width: 900px;
      margin: auto;
      line-height: 1.7;
      font-size: 15px;
    }

    .join {
      margin-top: 70px;
      padding-top: 40px;
      border-top: 1px solid #e5e7eb;
      text-align: center;
    }

    .join p {
      max-width: 800px;
      margin: 10px auto;
      line-height: 1.6;
    }

    .contact {
      margin-top: 20px;
      font-weight: bold;
    }

    footer {
      margin-top: 80px;
      padding: 20px;
      background: #0f172a;
      color: #fff;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header class="navbar">
  <div class="nav-container">
    <ul class="nav-links">
